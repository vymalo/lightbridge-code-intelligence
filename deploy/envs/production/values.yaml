# Production image tags for Lightbridge Code Intelligence.
#
# argocd-image-updater OWNS the `tag` fields below. On each `main` build it
# selects the newest signed `sha-<gitsha>` image from GHCR and commits the new
# tag here (git write-back). The ai-helm `aii-lightbridge-code-intelligence`
# Application reads this file as its `$values` source (targetRevision: main), so
# the commit auto-syncs to the cluster — no ai-helm release per deploy.
#
# Do NOT hand-edit the tags: image-updater is the source of truth and will
# overwrite manual changes. The keys mirror the chart's image paths in
# ai-helm/charts/lightbridge-code-intelligence (bjw-s app-template, alias `lci`).
lci:
  controllers:
    control-plane:
      containers:
        main:
          image:
            repository: ghcr.io/vymalo/lightbridge-control-plane
            tag: "sha-6ac519f"
    # The dispatcher runs the SAME image as the control plane (one binary, role-selected). It must
    # track the same tag — image-updater's `disp` alias owns this, seeded here so it never lags on
    # the chart's stale default (which predates the dispatcher role).
    dispatcher:
      containers:
        main:
          image:
            repository: ghcr.io/vymalo/lightbridge-control-plane
            tag: "sha-6ac519f"
    web:
      containers:
        main:
          image:
            repository: ghcr.io/vymalo/lightbridge-web
            tag: "sha-6ac519f"
