# Per-repo caller for the reusable opencode review (hosted in ADORSYS-GIS/ai-governance).
#
# Drop this at .github/workflows/opencode.yml to opt in. It runs an opencode PR
# review (auto on PRs, or `/oc` in a comment) and issue tasks (`/oc` on an issue),
# authenticating to the AI gateway via the lightbridge-repo-auth GitHub-OIDC
# binding — this repo's own id-token, no shared key.
#
# Prerequisite: set the variable OPENCODE_GATEWAY_AUDIENCE (org- or repo-level) to
# this org's Source audience, e.g.
#   https://api.ai.camer.digital/sources/src-XXXXXXXXXXXX
# and install the camer-digital-ai GitHub App on the org (so the OIDC binding
# resolves). See ai-helm ADR-0047.
#
# Pin the reusable workflow to an immutable SHA (not @main) as a supply-chain
# control — bump it deliberately, same convention as governance.yml.
name: opencode

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

concurrency:
  group: opencode-review-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  review:
    # No-op in repos that haven't set the audience var yet (so the synced file
    # never red-fails an unprepared repo); set OPENCODE_GATEWAY_AUDIENCE to enable.
    if: ${{ vars.OPENCODE_GATEWAY_AUDIENCE != '' }}
    # ADORSYS-GIS/ai-governance — pin to a release SHA in real repos.
    uses: ADORSYS-GIS/ai-governance/.github/workflows/opencode-review.yml@main
    permissions:
      id-token: write # mint the GHA OIDC token (gateway auth)
      contents: write # checkout + the action's git ops
      pull-requests: write # post the review
      issues: write # post issue-task / failure comments
    with:
      audience: ${{ vars.OPENCODE_GATEWAY_AUDIENCE }}
      # Optional overrides (defaults target the camer-digital gateway):
      # auto_model: camer-digital/adorsys-reviewer
      # manual_model: camer-digital/adorsys-reviewer-pro
      # issue_model: camer-digital/adorsys-reviewer-pro
      # runs_on: self-hosted   # for repos without GitHub-hosted runners