# Build and publish the container images the ai-helm deployment references
# (ghcr.io/<owner>/lightbridge-control-plane and .../lightbridge-web).
#
# PRs run `build` (validate only — no registry credentials). Pushes to main and version
# tags run `publish` (the only job granted packages: write + id-token: write). To cut the
# `0.1.0` tag the deployment pins, push a git tag `v0.1.0`.
#
# `publish` also cosign-signs each pushed digest (keyless, GitHub OIDC). On every main
# build argocd-image-updater promotes the newest signed `sha-<gitsha>` by committing it
# to deploy/envs/production/values.yaml — see deploy/README.md.
name: Build images

on:
  push:
    branches: [main]
    tags: ["v*"]
    # Don't rebuild on commits that only touch deploy tags or docs. Critically, this breaks the
    # argocd-image-updater feedback loop: image-updater writes the new image tag back to
    # deploy/envs/production/values.yaml on main, and without this filter that push would
    # re-trigger a build → newer image → another write-back → … (a runaway rebuild loop).
    paths-ignore:
      - "deploy/**"
      - "docs/**"
      - "**/*.md"
  pull_request:

# Minimal default; the publish job opts into packages: write explicitly.
permissions:
  contents: read

jobs:
  build:
    # PR validation: build both images, no push, no registry token.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: lightbridge-control-plane
            dockerfile: services/control-plane/Dockerfile
          - image: lightbridge-web
            dockerfile: apps/web/Dockerfile
          - image: lightbridge-agent-runner
            dockerfile: services/agent-runner/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          # Load into the local daemon so we can measure the built image (size report below).
          load: true
          tags: ${{ matrix.image }}:pr
          cache-from: type=gha
          cache-to: type=gha,mode=max
      # Surface the image size in the PR run summary so size regressions are visible at review time
      # (optimization tracking, epic #89). Uncompressed (on-disk) size.
      - name: Report image size
        continue-on-error: true
        run: |
          bytes=$(docker image inspect "${{ matrix.image }}:pr" --format '{{.Size}}')
          printf '### 📦 %s\n\n**%s** uncompressed\n' \
            "${{ matrix.image }}" "$(numfmt --to=iec --suffix=B "$bytes")" >> "$GITHUB_STEP_SUMMARY"

  publish:
    # main / version tags: build + push to GHCR, then cosign-sign each pushed
    # digest. Only this job can write packages. `id-token: write` lets cosign
    # mint a keyless Fulcio cert from the GitHub OIDC token (no long-lived key);
    # argocd-image-updater verifies that signature before promoting an image.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: lightbridge-control-plane
            dockerfile: services/control-plane/Dockerfile
          - image: lightbridge-web
            dockerfile: apps/web/Dockerfile
          - image: lightbridge-agent-runner
            dockerfile: services/agent-runner/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      # Compressed (registry pull) size of the pushed image — what clusters actually pull. Surfaced in
      # the run summary for optimization tracking (epic #89). NEVER fail the job over a size report:
      # it runs before the signing step, and a broken report must not leave an unsigned (un-promotable)
      # image. `imagetools inspect --raw` returns a manifest *or* a multi-arch index, so we sum every
      # `.size` field recursively (config + layers, or the index's per-platform manifest sizes).
      - name: Report image size
        continue-on-error: true
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          bytes=$(docker buildx imagetools inspect "${IMAGE}@${DIGEST}" --raw \
            | jq '[.. | .size? // empty] | add // 0')
          printf '### 📦 %s\n\n**%s** compressed (`%s`)\n' \
            "${{ matrix.image }}" "$(numfmt --to=iec --suffix=B "$bytes")" "$DIGEST" >> "$GITHUB_STEP_SUMMARY"
      # Keyless cosign signature over the immutable digest (covers every tag that
      # points at it). argocd-image-updater refuses any digest whose signature
      # doesn't trace back to this workflow's identity (Fulcio + Rekor).
      - name: Sign image
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"
